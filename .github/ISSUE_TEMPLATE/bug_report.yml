name: Bug Report
description: Signaler un bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Merci de prendre le temps de signaler ce bug !
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Décris le bug clairement
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Comment reproduire le problème ?
      placeholder: |
        1. Aller sur '...'
        2. Cliquer sur '...'
        3. Voir l'erreur
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Que devrait-il se passer ?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Si applicable, ajoute des captures d'écran
  - type: dropdown
    id: browser
    attributes:
      label: Navigateur
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Autre
  - type: dropdown
    id: device
    attributes:
      label: Appareil
      options:
        - Desktop
        - Mobile
        - Tablette
